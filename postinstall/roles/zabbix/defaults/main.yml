zabbix_postgres_image: "docker.io/library/postgres:16-alpine"
zabbix_server_image: "docker.io/zabbix/zabbix-server-pgsql:alpine-7.4-latest"
zabbix_web_image: "docker.io/zabbix/zabbix-web-nginx-pgsql:alpine-7.4-latest"

zabbix_db_name: "zabbix"
zabbix_db_user: "zabbix"

zabbix_timezone: "Europe/Oslo"
zabbix_web_port: 8080

zabbix_data_dir: "{{ ansible_env.HOME }}/.local/share/zabbix"
zabbix_quadlet_dir: "{{ ansible_env.HOME }}/.config/containers/systemd"
