- name: Reload NetworkManager connections
  ansible.builtin.command:
    cmd: nmcli connection reload
  changed_when: true

- name: Restart camera AP
  ansible.builtin.command:
    cmd: nmcli con up {{ camera_ap_connection_name }}
  changed_when: true

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart camera AP firewall
  ansible.builtin.systemd:
    name: camera-ap-firewall.service
    state: restarted
