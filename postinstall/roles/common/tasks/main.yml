- name: Install repo/plugin basics
  ansible.builtin.dnf:
    name:
      - dnf-plugins-core
      - epel-release
    state: present

- name: Enable CRB repo
  ansible.builtin.command:
    cmd: dnf config-manager --set-enabled crb
  changed_when: false

- name: Install useful base packages
  ansible.builtin.dnf:
    name:
      - bash-completion
      - curl
      - dnsmasq
      - fwupd
      - git
      - htop
      - iw
      - jq
      - ncdu
      - NetworkManager-wifi
      - nmap
      - nmap-ncat
      - openssl
      - rsync
      - tmux
      - tree
      - vim-enhanced
      - wget
      - wpa_supplicant
    state: present

- name: Check SELinux mode
  ansible.builtin.command:
    cmd: getenforce
  register: selinux_mode
  changed_when: false

- name: Assert SELinux is enforcing
  ansible.builtin.assert:
    that:
      - selinux_mode.stdout == "Enforcing"
    fail_msg: "SELinux is not enforcing: {{ selinux_mode.stdout }}"
    success_msg: "SELinux is enforcing"

- name: Set hostname when configured
  ansible.builtin.hostname:
    name: "{{ system_hostname }}"
  when: system_hostname is defined

- name: Ensure firewalld is enabled and running
  ansible.builtin.systemd_service:
    name: firewalld
    enabled: true
    state: started

- name: Ensure systemd logind config dir exists
  ansible.builtin.file:
    path: /etc/systemd/logind.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ignore laptop lid close
  ansible.builtin.copy:
    dest: /etc/systemd/logind.conf.d/99-ignore-lid.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Login]
      HandleLidSwitch=ignore
      HandleLidSwitchExternalPower=ignore
      HandleLidSwitchDocked=ignore
  notify: Restart systemd-logind
