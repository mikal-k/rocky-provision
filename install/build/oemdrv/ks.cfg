#version=RHEL10

text
cdrom
reboot --eject

lang en_US.UTF-8
keyboard --vckeymap=no --xlayouts='no'
timezone Europe/Oslo --utc

network --bootproto=dhcp --device=link --activate --hostname=rocky-vm

rootpw --lock
user --name=rocky --groups=wheel --iscrypted --password=$6$SO0mENalBy04IqEG$bb2lFjleC9SrVFe38m7dwiDHDiwF338IIC7MjR5.1WIbiQzRqpSVQHrsVGUTlR1iItMzhgSxB35yShmYovcXL. --gecos="Rocky User"

firstboot --disable
skipx

selinux --enforcing
firewall --enabled --service=ssh
services --enabled=sshd,chronyd

zerombr
clearpart --all --initlabel
autopart --type=lvm --fstype=xfs
bootloader --location=mbr

%packages
@^minimal-environment
openssh-server
sudo
curl
chrony
tar
rsync
bash-completion
%end

%post --interpreter=/bin/bash
echo "rocky ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/90-rocky
chmod 440 /etc/sudoers.d/90-rocky

mkdir -p /home/rocky/.ssh
cat > /home/rocky/.ssh/authorized_keys <<'EOF'
ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIwjWyJMpTNHp/aBh7am1VlMbFODN1UPKVrMGey+DmYS mikal@fr3dag
EOF

chown -R rocky:rocky /home/rocky/.ssh
chmod 700 /home/rocky/.ssh
chmod 600 /home/rocky/.ssh/authorized_keys
%end
